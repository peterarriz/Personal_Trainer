name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check repo hygiene
        run: npm run test:repo-hygiene

      - name: Check architecture and UX gates
        run: npm run test:architecture

      - name: Run focused quality unit pack
        run: npm run test:quality:unit

      - name: Run adaptive shadow evaluation fixture gate
        run: npm run qa:adaptive-policy:shadow-eval:fixture

      - name: Run adaptive launch-readiness fixture gate
        run: npm run qa:adaptive-policy:launch-readiness:fixture

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run focused quality Playwright pack
        run: npm run test:quality:e2e

      - name: Build dist output
        run: npm run build

      - name: Upload adaptive rollout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-rollout-artifacts
          path: |
            artifacts/adaptive-policy-shadow-evaluation/**
            artifacts/adaptive-launch-readiness/**
