name: Adversarial E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  adversarial-e2e:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run adversarial Playwright suite
        run: npm run e2e:adversarial:ci

      - name: Upload adversarial artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-e2e-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
