function MiniChart({ data, color, baseline }) {
  if (data.length < 2) return null;
  const min = Math.min(...data, baseline) - 2;
  const max = Math.max(...data, baseline) + 2;
  const w = 300, h = 50;
  const pts = data.map((v,i) => {
    const x = (i / (data.length-1)) * w;
    const y = h - ((v - min) / (max - min)) * h;
    return `${x},${y}`;
  });
  const baselineY = h - ((baseline - min) / (max - min)) * h;
  return (
    React.createElement('svg', { viewBox: `0 0 ${w} ${h}`, style: { width:"100%", height:50 },}
      , React.createElement('line', { x1: 0, y1: baselineY, x2: w, y2: baselineY, stroke: "#1e293b", strokeWidth: 1, strokeDasharray: "4,4",} )
      , React.createElement('polyline', { points: pts.join(" "), fill: "none", stroke: color, strokeWidth: 2,} )
      , data.map((v,i) => {
        const x = (i/(data.length-1))*w;
        const y = h - ((v-min)/(max-min))*h;
        return React.createElement('circle', { key: i, cx: x, cy: y, r: 3, fill: color,} );
      })
    )
  );
}
